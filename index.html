<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多頻道監視器 - YT Live Monitor</title>
    <meta name="description" content="同時觀看多個 YouTube 直播頻道的多頻道監視器">
    <meta name="referrer" content="unsafe-url">
    <link rel="stylesheet" href="style.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <i class="fa-solid fa-satellite-dish"></i>
                <h1>YT Monitor <span>Command Center</span></h1>
            </div>
            <div class="header-controls">
                <button id="share-url-btn" class="glow-btn outline" style="margin-right: 15px; border-color: var(--accent-color); color: var(--accent-color);" title="複製網址，分享當前觀看畫面給朋友！">
                    <i class="fa-solid fa-share-nodes"></i> 分享畫面
                </button>
                <span id="active-count" style="margin-right: 15px;">0 / 9 頻道</span>
                <button id="dashboard-btn" class="glow-btn">
                    <i class="fa-solid fa-table-columns"></i> 控制面板
                </button>
            </div>
        </header>

        <main id="monitor-grid" class="grid-container empty">
            <div class="empty-state">
                <i class="fa-brands fa-youtube"></i>
                <h2>系統待命中</h2>
                <p>請開啟控制面板新增並選擇要監控的頻道</p>
                <button id="empty-add-btn" class="glow-btn outline">開啟控制面板</button>
            </div>
        </main>
    </div>

    <!-- Dashboard Modal -->
    <div id="dashboard-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2><i class="fa-solid fa-sliders"></i> 頻道控制面板</h2>
                <button id="close-modal-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="modal-body">
                <div class="add-channel-section">
                    <h3>新增頻道</h3>
                    <div class="input-group">
                        <textarea id="yt-url-input" rows="4" placeholder="【支援大量匯入】&#10;請直接貼上多個 YouTube 網址...&#10;用「換行」或「空白鍵」隔開即可，一次貼幾十個都沒問題！"></textarea>
                        <button id="add-yt-btn" class="primary-btn"><i class="fa-solid fa-plus"></i> 新增</button>
                    </div>
                    <p class="helper-text">支援 YouTube 直播或一般影片連結</p>

                    <div class="quick-selector">
                        <h4><i class="fa-solid fa-border-all"></i> 快速視窗排版</h4>
                        <div class="chip-container">
                            <button class="layout-btn icon-chip" data-count="2" title="雙影片">
                                <div class="layout-icon grid-2-icon"><span></span><span></span></div>
                            </button>
                            <button class="layout-btn icon-chip" data-count="4" title="四影片">
                                <div class="layout-icon grid-4-icon"><span></span><span></span><span></span><span></span></div>
                            </button>
                            <button class="layout-btn icon-chip" data-count="6" title="六影片">
                                <div class="layout-icon grid-6-icon"><span></span><span></span><span></span><span></span><span></span><span></span></div>
                            </button>
                            <button class="layout-btn icon-chip" data-count="9" title="九影片">
                                <div class="layout-icon grid-9-icon"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
                            </button>
                        </div>
                    </div>

                    <!-- 群組管理區塊 -->
                    <div class="group-section">
                        <div class="group-header">
                            <h4><i class="fa-solid fa-layer-group"></i> 頻道群組</h4>
                            <button id="save-group-btn" class="action-btn"><i class="fa-solid fa-bookmark"></i> 儲存當前畫面</button>
                        </div>
                        <div id="group-list" class="chip-container">
                            <!-- 群組會動態生成在這裡 -->
                        </div>
                    </div>
                </div>

                <div class="channel-list-section">
                    <h3>頻道庫 (<span id="library-count">0</span>)</h3>
                    <ul id="channel-list" class="custom-scrollbar">
                        <!-- Channel items will be injected here -->
                    </ul>
                </div>

                <!-- 系統設定與備份 -->
                <div class="settings-section" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                    <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-database"></i> 備份與同步</h3>
                    <p class="helper-text" style="margin-bottom: 10px;">將您的頻道庫與群組複製到其他電腦使用：</p>
                    <div class="input-group" style="margin-top: 5px;">
                        <button id="export-btn" class="action-btn"><i class="fa-solid fa-file-export"></i> 產生備份代碼</button>
                        <button id="import-btn" class="action-btn" style="border-color: var(--success-color); color: var(--success-color);"><i class="fa-solid fa-file-import"></i> 貼上並匯入</button>
                    </div>
                    <textarea id="backup-data-input" rows="3" placeholder="點擊「產生備份代碼」會在此顯示您的設定；若要匯入其他電腦的設定，請在此貼上代碼後點擊「貼上並匯入」。" style="margin-top: 10px; display: none; font-family: monospace; font-size: 0.8rem;"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=7"></script>
</body>
</html>
